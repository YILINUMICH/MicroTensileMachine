; PlatformIO Project Configuration
;
; Usage:
;   pio run                    # build
;   pio run -t upload          # build + flash
;   pio device monitor         # open serial monitor @ 115200
;   pio run -t clean           # clean build artifacts
;
; Default target is Arduino Uno because the ADS1263 driver pin map
; (CS=10, DRDY=2, RESET=9) matches Uno. To target another AVR board,
; add a new [env:...] block and edit the pins in lib/ADS1263/ADS1263_Driver.h.

[platformio]
default_envs = uno

[env:uno]
platform       = atmelavr
board          = uno
framework      = arduino
monitor_speed  = 115200
monitor_filters = default
; uncomment if you need a non-default port:
; upload_port  = /dev/cu.usbmodemXXXX
; monitor_port = /dev/cu.usbmodemXXXX

build_flags =
    -Wall
    -Wextra

; --- Example alternative board (uncomment and customize if needed) ---
; [env:nano]
; platform      = atmelavr
; board         = nanoatmega328
; framework     = arduino
; monitor_speed = 115200
;
; [env:mega]
; platform      = atmelavr
; board         = megaatmega2560
; framework     = arduino
; monitor_speed = 115200
