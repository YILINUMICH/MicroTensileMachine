; PlatformIO Project Configuration — Portenta H7 M4 core
;
; This project runs the load-cell reader on the H7's M4 co-processor.
; The M4 has no direct USB, so Serial output is bridged through the M7
; via the Arduino RPC library. You therefore need TWO firmware images:
;
;   1. [env:portenta_m7_bridge]  → tiny M7 sketch that boots M4 +
;                                  forwards RPC ↔ USB Serial.
;                                  FLASH THIS FIRST (one time).
;   2. [env:portenta_m4]         → the actual load-cell application.
;                                  FLASH THIS SECOND.
;
; Both envs compile the same src/main.cpp; the #ifdef CORE_CMx guard
; picks the right code per core.
;
; Usage:
;   pio run                               # builds default env (M4)
;   pio run -e portenta_m7_bridge -t upload   # flash M7 bridge once
;   pio run -e portenta_m4        -t upload   # flash M4 application
;   pio device monitor                    # 115200 baud — sees M4 output via M7

[platformio]
default_envs = portenta_m4

[env:portenta_m4]
platform        = ststm32
board           = portenta_h7_m4
framework       = arduino
monitor_speed   = 115200
monitor_filters = default
build_flags =
    -Wall
    -Wextra

[env:portenta_m7_bridge]
platform        = ststm32
board           = portenta_h7_m7
framework       = arduino
monitor_speed   = 115200
monitor_filters = default
build_flags =
    -Wall
    -Wextra
