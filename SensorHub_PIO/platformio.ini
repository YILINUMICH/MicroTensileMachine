; PlatformIO Project Configuration — Portenta H7 M4 core  (SensorHub)
;
; This project runs BOTH ADS1263 ADC paths simultaneously on the H7's M4:
;   - ADC1 (32-bit) on AIN0/AIN1  → load cell front-end
;   - ADC2 (24-bit) on AIN2/AIN3  → laser displacement head
;
; It is the natural merge of the sibling LoadCell_PIO (ADC1-only) and
; LaserHead_PIO (ADC2-only) projects. Purposes:
;   (1) Single firmware image for the full tensile rig — load and
;       displacement captured from the same HAT, no cross-talk.
;   (2) Diagnostic aid: if ADC2 misbehaves on AIN2/AIN3 but ADC1 reads
;       correctly on AIN0/AIN1, the fault is local to the ADC2 input
;       path, not to the chip, HAT power, or driver.
;
; The M4 has no direct USB, so Serial output is bridged through the M7
; via the Arduino RPC library. You therefore need TWO firmware images:
;
;   1. [env:portenta_m7_bridge]  → tiny M7 sketch that boots M4 +
;                                  forwards RPC ↔ USB Serial.
;                                  FLASH THIS FIRST (one time).
;   2. [env:portenta_m4]         → the dual-ADC sampler (this project).
;                                  FLASH THIS SECOND.
;
; Both envs compile the same src/main.cpp; the #ifdef CORE_CMx guard
; picks the right code per core.
;
; Usage:
;   pio run                                   # builds default env (M4)
;   pio run -e portenta_m7_bridge -t upload   # flash M7 bridge once
;   pio run -e portenta_m4        -t upload   # flash M4 application
;   pio device monitor                        # 115200 baud — sees M4 output via M7
;
; Remember: power-cycle the Hat Carrier after every upload — the dfu
; reset does not cleanly re-power the HAT's 3.3V LDO rail, and the
; ADS1263 will come up with ID=0x00 if you skip the cycle.

[platformio]
default_envs = portenta_m4

[env:portenta_m4]
platform        = ststm32
board           = portenta_h7_m4
framework       = arduino
monitor_speed   = 115200
monitor_filters = default
build_flags =
    -Wall
    -Wextra

[env:portenta_m7_bridge]
platform        = ststm32
board           = portenta_h7_m7
framework       = arduino
monitor_speed   = 115200
monitor_filters = default
build_flags =
    -Wall
    -Wextra
